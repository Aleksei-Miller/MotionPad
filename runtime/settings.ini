[General]
; Path to the active input profile (relative to runtime\)
Path=profiles\hybrid mode.ini

; Enable all output: Xbox controller, keyboard, and mouse (1=on, 0=off)
EnableOutput=1

; Stream controller state (battery, buttons, gyro, accel) via named pipe for external tools (1=on, 0=off)
EnableTelemetry=0

; Use BthPS3 (Bluetooth) backend for PS Navigation (1=on, 0=off). libnavinput is used when BthPS3=0.
UseBthPS3=1

; Auto-switch profile based on foreground window's executable name (1=on, 0=off)
; Set [Profile] Path= in each .ini profile to match a process name (e.g. "notepad.exe")
UseAutoProfile=1

; Main loop sleep in ms (1-100, lower = higher CPU usage but lower latency)
PollRateMs=12
